# 서버 설정
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dev-info

  profiles:
    active: dev

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 로깅 설정(공통)
logging:
  level:
    root: INFO
    com.study.myspringstudydiary: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG

jwt:
  secret: "YourBase64EncodedSecretKeyHereMustBeAtLeast256BitsLong!!"
  access-token-expiration: 1800000    # 30분 (밀리초)
  refresh-token-expiration: 604800000 # 7일 (밀리초)


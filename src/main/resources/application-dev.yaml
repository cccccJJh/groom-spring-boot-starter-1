    # MySQL 대신 H2 메모리 DB를 사용 (MySQL 모드로 작동하게 설정)
    url: jdbc:h2:mem:dev_info_diary;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      encoding: UTF-8
